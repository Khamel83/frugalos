name: Dependency Update

on:
  schedule:
    # Run every Monday at 9:00 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  update-dependencies:
    name: Update Dependencies
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install pip-tools
      run: |
        python -m pip install --upgrade pip
        pip install pip-tools

    - name: Update dependencies
      run: |
        # Compile updated requirements
        pip-compile requirements.in --upgrade
        pip-compile requirements-dev.in --upgrade

        # Check for security updates
        pip-audit --requirement requirements.txt

    - name: Check for changes
      id: verify-changed-files
      run: |
        if [ -n "$(git status --porcelain)" ]; then
          echo "changed=true" >> $GITHUB_OUTPUT
        else
          echo "changed=false" >> $GITHUB_OUTPUT
        fi

    - name: Run tests with updated dependencies
      if: steps.verify-changed-files.outputs.changed == 'true'
      run: |
        python -m pip install -r requirements.txt
        python -m pip install -r requirements-dev.txt

        # Run basic tests to ensure compatibility
        pytest tests/unit/ -v --tb=short

    - name: Create Pull Request
      if: steps.verify-changed-files.outputs.changed == 'true'
      uses: peter-evans/create-pull-request@v5
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: 'chore: update Python dependencies'
        title: 'chore: update Python dependencies'
        body: |
          🤖 Automated dependency update

          This PR updates Python dependencies to their latest versions.

          ### Changes
          - Updated requirements.txt with latest package versions
          - Updated requirements-dev.txt with latest development dependencies

          ### Verification
          - Basic compatibility tests have been run
          - Security audit has been performed

          Please review the changes and ensure all tests pass before merging.
        branch: chore/update-dependencies
        delete-branch: true
        labels: |
          dependencies
          automated

  update-docker-dependencies:
    name: Update Docker Base Images
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Renovate for Docker updates
      uses: renovatebot/github-action@v39.1.3
      with:
        configurationFile: .github/renovate.json5
        token: ${{ secrets.GITHUB_TOKEN }}

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Run safety check
      run: |
        pip install safety
        safety check --json --output safety-report.json
        safety check