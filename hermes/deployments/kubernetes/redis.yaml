---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: redis
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-ai-assistant
      component: redis
  template:
    metadata:
      labels:
        app: hermes-ai-assistant
        component: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        command:
        - redis-server
        - /etc/redis/redis.conf
        volumeMounts:
        - name: redis-storage
          mountPath: /data
        - name: redis-config
          mountPath: /etc/redis
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: redis-storage
        persistentVolumeClaim:
          claimName: redis-pvc
      - name: redis-config
        configMap:
          name: redis-config
---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: redis
spec:
  selector:
    app: hermes-ai-assistant
    component: redis
  ports:
  - port: 6379
    targetPort: 6379
    name: redis
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: redis
data:
  redis.conf: |
    # Redis Configuration for Hermes
    bind 0.0.0.0
    port 6379
    protected-mode no

    # Persistence
    save 900 1
    save 300 10
    save 60 10000
    rdbcompression yes
    rdbchecksum yes
    dbfilename dump.rdb
    dir /data

    # Memory
    maxmemory 512mb
    maxmemory-policy allkeys-lru

    # Security
    requirepass hermes_redis_password

    # Logging
    loglevel notice
    logfile ""

    # Performance
    tcp-keepalive 300
    timeout 0
    tcp-backlog 511

    # Networking
    tcp-keepalive 60
    timeout 0

    # Clients
    maxclients 10000

    # Slow log
    slowlog-log-slower-than 10000
    slowlog-max-len 128

    # Replication (if needed in future)
    # replica-serve-stale-data yes
    # replica-read-only yes
    # repl-diskless-sync no
    # repl-diskless-sync-delay 5