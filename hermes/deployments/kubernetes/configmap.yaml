---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: config
data:
  config.yaml: |
    # Production Configuration for Hermes Autonomous AI Assistant
    hermes:
      debug: false
      log_level: INFO
      max_file_size: 50MB
      upload_folder: "/opt/hermes/uploads"

    database:
      type: postgresql
      host: postgres-service
      port: 5432
      name: hermes
      user: hermes
      backup_enabled: true
      backup_retention_days: 30
      connection_pool_size: 10
      connection_timeout: 30

    redis:
      host: redis-service
      port: 6379
      db: 0
      connection_pool_size: 10

    backends:
      health_check:
        enabled: true
        interval: 30
        timeout: 5
        failure_threshold: 3

      load_balancing:
        strategy: FASTEST_RESPONSE
        max_concurrent: 20
        update_interval: 10

      failover:
        strategy: PROGRESSIVE
        max_retries: 3
        retry_delay: 1.0
        circuit_breaker_threshold: 5
        circuit_breaker_timeout: 60

      cost_tracking:
        daily_budget_cents: 500
        monthly_budget_cents: 15000
        enable_persistence: true

    metalearning:
      enabled: true
      question_generator:
        max_questions: 5
        confidence_threshold: 0.6
      pattern_engine:
        learning_rate: 0.1
        max_patterns: 1000
        min_similarity: 0.7
        cleanup_interval: 3600
      context_optimizer:
        max_context_tokens: 8000
        min_importance: 0.3
        cleanup_interval: 300

    autonomous:
      scheduler:
        enabled: true
        interval: 60
        max_concurrent: 10
        learning_mode: true
      suggestions:
        enabled: true
        min_confidence: 0.6
        max_active: 20
      automation:
        enabled: true
        max_concurrent: 10
      optimization:
        enabled: true
        learning_window_days: 30
        min_samples: 10
        confidence_threshold: 0.7

    autonomous_dev:
      enabled: true
      code_modifier:
        enabled: true
        auto_apply_safe: true
        max_modifications_per_file: 10
      learner:
        enabled: true
        learning_rate: 0.1
        min_confidence: 0.6
        max_patterns: 2000
      self_healing:
        enabled: true
        max_concurrent_healings: 5
        default_timeout: 120
      optimizer:
        enabled: true
        interval: 1800
        confidence_threshold: 0.8
        auto_apply_safe: true

    cache:
      enabled: true
      cache_manager:
        max_memory_items: 5000
        max_memory_size_mb: 500
        max_disk_items: 50000
        disk_cache_dir: "/opt/hermes/cache"
        default_ttl_seconds: 7200
        enable_compression: true
        enable_persistence: true
        cleanup_interval_seconds: 600

    performance:
      profiling:
        enabled: true
        max_profiles: 5000
        auto_profile: true
        threshold_ms: 100
        enable_persistence: true

    security:
      threat_detection:
        enabled: true
        ml_enabled: true
        block_threshold: 0.8
      rate_limiting:
        enabled: true
        requests_per_minute: 300
        burst_limit: 500

    monitoring:
      enabled: true
      metrics:
        collection_interval: 30
        retention_days: 90
      alerts:
        enabled: true

    production:
      max_workers: 20
      thread_pool_size: 50
      connection_pool_size: 20
      cache_warmup: true
      cache_warmup_size: 1000
      cors_origins: ["https://hermes.company.com"]
      csrf_protection: true
      session_timeout: 7200
      log_level: INFO
      log_file: "/var/log/hermes/app.log"
      log_rotation: daily
      log_retention: 90
      backups:
        enabled: true
        schedule: "0 2 * * *"
        retention_days: 30
        backup_dir: "/opt/hermes/backups"
        compress: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # Logging
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                       '$status $body_bytes_sent "$http_referer" '
                       '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;
        error_log /var/log/nginx/error.log;

        # Performance
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip compression
        gzip on;
        gzip_vary on;
        gzip_min_length 10240;
        gzip_proxied expired no-cache no-store private must-revalidate;
        gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript;

        # Rate limiting
        limit_req_zone $binary_remote_addr zone=hermes_limit:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

        # Upstream backend
        upstream hermes_backend {
            server hermes-service:8080 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        # Main server
        server {
            listen 80;
            server_name _;

            # Security headers
            add_header X-Frame-Options DENY;
            add_header X-Content-Type-Options nosniff;
            add_header X-XSS-Protection "1; mode=block";
            add_header Referrer-Policy strict-origin-when-cross-origin;

            # Main application
            location / {
                limit_req zone=hermes_limit burst=20 nodelay;
                proxy_pass http://hermes_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Timeouts
                proxy_connect_timeout 60s;
                proxy_send_timeout 60s;
                proxy_read_timeout 60s;

                # Buffer settings
                proxy_buffering on;
                proxy_buffer_size 4k;
                proxy_buffers 8 4k;
            }

            # API endpoints with higher rate limit
            location /api/ {
                limit_req zone=api_limit burst=50 nodelay;
                proxy_pass http://hermes_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            # Health check endpoint
            location /health {
                access_log off;
                proxy_pass http://hermes_backend/api/orchestrator/status;
            }

            # Static files (if any)
            location /static/ {
                alias /opt/hermes/static/;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }