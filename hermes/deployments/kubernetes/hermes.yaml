---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-service-account
  namespace: hermes
  labels:
    app: hermes-ai-assistant
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-data-pvc
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs  # Adjust based on your cluster
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-cache-pvc
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: hermes-ai-assistant
      component: hermes
  template:
    metadata:
      labels:
        app: hermes-ai-assistant
        component: hermes
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/api/metrics"
    spec:
      serviceAccountName: hermes-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
      - name: hermes
        image: hermes-ai-assistant:latest  # Replace with your actual image
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: HERMES_ENV
          value: "production"
        - name: HERMES_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: hermes-secret-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: redis-url
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: openai-api-key
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: anthropic-api-key
        - name: GOOGLE_API_KEY
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: google-api-key
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: hermes-secrets
              key: smtp-password
        - name: DATA_DIR
          value: "/opt/hermes/data"
        - name: CACHE_DIR
          value: "/opt/hermes/cache"
        - name: LOG_DIR
          value: "/var/log/hermes"
        - name: BACKUP_DIR
          value: "/opt/hermes/backups"
        volumeMounts:
        - name: hermes-config
          mountPath: /opt/hermes/config
          readOnly: true
        - name: hermes-data
          mountPath: /opt/hermes/data
        - name: hermes-cache
          mountPath: /opt/hermes/cache
        - name: hermes-logs
          mountPath: /var/log/hermes
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/orchestrator/status
            port: http
            scheme: HTTP
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/orchestrator/status
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/orchestrator/status
            port: http
            scheme: HTTP
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
      volumes:
      - name: hermes-config
        configMap:
          name: hermes-config
      - name: hermes-data
        persistentVolumeClaim:
          claimName: hermes-data-pvc
      - name: hermes-cache
        persistentVolumeClaim:
          claimName: hermes-cache-pvc
      - name: hermes-logs
        emptyDir: {}
      imagePullSecrets:
      - name: registry-secret
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-service
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/api/metrics"
spec:
  selector:
    app: hermes-ai-assistant
    component: hermes
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hermes-hpa
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: hermes
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-headless
  namespace: hermes
  labels:
    app: hermes-ai-assistant
    component: hermes
spec:
  clusterIP: None
  selector:
    app: hermes-ai-assistant
    component: hermes
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP