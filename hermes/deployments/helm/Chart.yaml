apiVersion: v2
name: hermes-ai-assistant
description: A comprehensive Helm chart for deploying Hermes Autonomous AI Assistant
type: application
version: 1.0.0
appVersion: "1.0.0"
home: https://hermes-ai.com
sources:
  - https://github.com/hermes-ai/hermes
maintainers:
  - name: Hermes AI Team
    email: team@hermes-ai.com
keywords:
  - ai
  - assistant
  - machine-learning
  - autonomous
  - meta-learning
annotations:
  category: AI/Machine Learning
  licenses: MIT
dependencies:
  - name: postgresql
    version: 12.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 17.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: ingress-nginx
    version: 4.x.x
    repository: https://kubernetes.github.io/ingress-nginx
    condition: ingress-nginx.enabled
  - name: prometheus
    version: 23.x.x
    repository: https://prometheus-community.github.io/helm-charts
    condition: monitoring.prometheus.enabled
  - name: grafana
    version: 6.x.x
    repository: https://grafana.github.io/helm-charts
    condition: monitoring.grafana.enabled